[[stages]]
text = """Build a kanban board app called `keyboard-kanban-app-{{cell}}` with three columns -- To do, Doing, Done. The catch: it has to be fully usable from the keyboard alone -- arrow keys to move the selection between cards, and a key to shift the selected card into the next column. It should also still hold up on a narrow phone-width screen. Seed the cards from our seat inventory. Let's start there."""

[[stages]]
text = """Let's change the controls -- the arrow keys should move the selected card around, and use a / d (or h / l) to send it left or right between columns."""

[[stages]]
text = """Add a Blocked column too, sitting between Doing and Done."""

[[stages]]
text = """And drop the mouse entirely -- no click-to-select, keyboard only. Then call submit_result with result = {"app_id": "<the app's id>", "app_name": "<the app's name>"}."""

[result_schema]
type = "object"
required = ["app_id", "app_name"]
additionalProperties = false

  [result_schema.properties.app_id]
  type = "string"
  minLength = 1

  [result_schema.properties.app_name]
  type = "string"
  minLength = 1

[state]
rest = ["/api/apps?search=keyboard-kanban-app-{{cell}}&limit=100"]
