artifact_key = "artifact"

[[stages]]
text = """Hey, can you put together a material cost takeoff from materials.json? It's our building
line-item export, one row per material with a trade, a level, a quantity, a unit cost, and sometimes a
spec section.

I'd like the total cost by trade, the total cost by floor/level, the material ids that are missing a
spec section so I can chase those down, and an Excel .xlsx summary I can share around.

For the math: each line's cost is quantity times unit cost. Some quantities have commas in them as
thousands separators, so treat those as plain numbers before multiplying. The one voided line should
sit out of every total and out of the missing-spec list. Trade totals group by trade name, level
totals by level name, and the grand total is everything that isn't voided. For the missing-spec list,
give me every non-voided material id whose spec section is blank or missing -- those lines still cost
money, so they stay in the cost totals; it's just the spec reference that's gone.

When it's ready, export the workbook with download_file and send it over with submit_result like:
result = {
  "artifact": "<exported filename>",
  "totals_by_trade": [{"trade": "<name>", "total_cost": <number>}, ...],
  "totals_by_level": [{"level": "<name>", "total_cost": <number>}, ...],
  "missing_spec_material_ids": ["<material_id>", ...],
  "grand_total_cost": <number>
}"""

  [[stages.files]]
  src = "materials.json"
  dest = "/home/sandbox/attachments/materials.json"
  mime_type = "application/json"

[result_schema]
type = "object"
required = ["artifact", "totals_by_trade", "totals_by_level", "missing_spec_material_ids", "grand_total_cost"]
additionalProperties = false

  [result_schema.properties.artifact]
  type = "string"
  minLength = 1

  [result_schema.properties.totals_by_trade]
  type = "array"

    [result_schema.properties.totals_by_trade.items]
    type = "object"
    required = ["trade", "total_cost"]
    additionalProperties = false

      [result_schema.properties.totals_by_trade.items.properties.trade]
      type = "string"

      [result_schema.properties.totals_by_trade.items.properties.total_cost]
      type = "number"

  [result_schema.properties.totals_by_level]
  type = "array"

    [result_schema.properties.totals_by_level.items]
    type = "object"
    required = ["level", "total_cost"]
    additionalProperties = false

      [result_schema.properties.totals_by_level.items.properties.level]
      type = "string"

      [result_schema.properties.totals_by_level.items.properties.total_cost]
      type = "number"

  [result_schema.properties.missing_spec_material_ids]
  type = "array"

    [result_schema.properties.missing_spec_material_ids.items]
    type = "string"

  [result_schema.properties.grand_total_cost]
  type = "number"

[verifier]
deps = ["openpyxl==3.1.5"]
