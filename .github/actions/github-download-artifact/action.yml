name: GitHub Download Artifact
description: Wrapper around actions/download-artifact pinned to a vetted version.
inputs:
  name:
    description: Name of the artifact to download.
    required: false
    default: ""
  path:
    description: Destination path for the downloaded artifact.
    required: false
    default: ""
  pattern:
    description: Glob pattern matching artifacts to download.
    required: false
    default: ""
  merge-multiple:
    description: When true, merge multiple matching artifacts into the same directory.
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Download artifact by name
      if: ${{ inputs.name != '' }}
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
    - name: Download artifact by pattern
      if: ${{ inputs.name == '' && inputs.pattern != '' }}
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: ${{ inputs.path }}
        pattern: ${{ inputs.pattern }}
        merge-multiple: ${{ inputs.merge-multiple }}
