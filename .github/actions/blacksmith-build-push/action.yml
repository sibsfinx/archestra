name: Blacksmith Build Push
description: Wrapper around useblacksmith/build-push-action pinned to a vetted version.
inputs:
  context:
    description: Build context.
    required: true
  file:
    description: Path to the Dockerfile.
    required: false
    default: ""
  platforms:
    description: Target platforms.
    required: false
    default: ""
  push:
    description: Whether to push the built image.
    required: false
    default: "false"
  load:
    description: Whether to load the built image into the local Docker daemon.
    required: false
    default: "false"
  tags:
    description: Image tags.
    required: false
    default: ""
  outputs:
    description: Build outputs configuration.
    required: false
    default: ""
  target:
    description: Optional Dockerfile target stage.
    required: false
    default: ""
  provenance:
    description: SLSA provenance attestation. Empty preserves buildx defaults; set 'false' to skip.
    required: false
    default: ""
  network:
    description: Network mode for the build.
    required: false
    default: ""
  build-args:
    description: Build arguments.
    required: false
    default: ""
  secrets:
    description: Build secrets.
    required: false
    default: ""
outputs:
  digest:
    description: Built image digest.
    value: ${{ steps.build.outputs.digest }}
runs:
  using: composite
  steps:
    - name: Build image
      id: build
      uses: useblacksmith/build-push-action@cbd1f60d194a98cb3be5523b15134501eaf0fbf3 # v2.1.0
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.file }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        load: ${{ inputs.load }}
        tags: ${{ inputs.tags }}
        outputs: ${{ inputs.outputs }}
        target: ${{ inputs.target }}
        provenance: ${{ inputs.provenance }}
        network: ${{ inputs.network }}
        build-args: ${{ inputs.build-args }}
        secrets: ${{ inputs.secrets }}
