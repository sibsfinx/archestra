name: Release Please

on:
  push:
    branches:
      - main
      - "release/*"
  workflow_dispatch:
    inputs:
      publish_existing_release:
        description: "Publish artifacts for an existing release instead of creating a new release-please release"
        required: false
        default: false
        type: boolean
      version:
        description: "Existing platform version to publish, without the v prefix (for example, 1.2.59)"
        required: false
        type: string
      tag_name:
        description: "Existing release tag to publish (for example, platform-v1.2.59)"
        required: false
        type: string
      publish_mcp_server_image:
        description: "Publish the MCP server base image"
        required: false
        default: true
        type: boolean
      publish_platform_image:
        description: "Publish the platform image to Docker Hub"
        required: false
        default: true
        type: boolean
      publish_helm_chart:
        description: "Publish the platform Helm chart"
        required: false
        default: true
        type: boolean
      finalize_github_release:
        description: "Un-draft the GitHub release after selected artifacts publish"
        required: false
        default: true
        type: boolean

permissions: {}

concurrency:
  group: release-please-${{ github.ref }}
  # Never preempt an in-flight release for the same branch. Subsequent pushes queue
  # behind the active run so artifact publishing can complete atomically.
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: write # Required to update manifests and release metadata in the repository.
      pull-requests: write # Required for release-please PR creation and updates.
      issues: write # Required for release-please issue comments and labels.
      id-token: write # Required for Workload Identity Federation in downstream release jobs.
    outputs:
      platform_should_publish: ${{ steps.resolve-release.outputs.should_publish }}
      platform_version: ${{ steps.resolve-release.outputs.version }}
      platform_tag_name: ${{ steps.resolve-release.outputs.tag_name }}
      platform_checkout_ref: ${{ steps.resolve-release.outputs.checkout_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate a token
        id: generate-token
        uses: ./.github/actions/github-app-token
        with:
          app-id: ${{ secrets.ARCHESTRA_RELEASER_GITHUB_APP_ID }}
          private-key: ${{ secrets.ARCHESTRA_RELEASER_GITHUB_APP_PRIVATE_KEY }}

      # release-please runs in TWO invocations (releases first, then PRs) instead of one.
      # A single invocation creates the GitHub release for a just-merged release PR as a
      # DRAFT (no git tag yet) and then immediately builds the next release PR in the same
      # process. That PR build looks up the manifest version's tag (e.g. platform-v1.3.3),
      # finds nothing, loses its "commits since last release" anchor, and walks deep
      # history — where old `Release-As: 1.3.0` commits force the new PR to a bogus stale
      # version with a months-long changelog (self-healing only on the next push to main).
      # Splitting lets us create the git tag for the draft release BEFORE the PR build, so
      # the version calculation is always anchored to the real latest release.
      - name: Create releases for merged release PRs
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        if: ${{ !inputs.publish_existing_release }}
        id: release-please
        with:
          token: ${{ steps.generate-token.outputs.token }}
          config-file: .github/release-please/release-please-config.json
          manifest-file: .github/release-please/.release-please-manifest.json
          target-branch: ${{ github.ref_name }}
          skip-github-pull-request: true

      # release-please creates the GitHub release as a DRAFT ("draft": true in
      # release-please-config.json) so it stays hidden until every artifact is built and
      # pushed. It is published (draft -> published) by the publish-github-release job
      # once all artifacts are ready.
      #
      # We do NOT toggle a published release back to draft: GitHub's immutable-releases
      # feature rejects that ("state cannot be changed when release is immutable", HTTP
      # 422), which is what previously failed the release-please job and silently skipped
      # every downstream image/chart publish job.
      #
      # Draft releases don't create the underlying git tag, but downstream build jobs
      # check out the tag ref (checkout_ref) and release-please needs the tag to exist
      # when calculating the next version (otherwise it creates bogus PRs with stale
      # versions). So we create the tag ourselves, pinned to the release commit, before
      # the next release PR is built below.
      - name: Create git tag for draft release
        if: ${{ steps.release-please.outputs['platform--release_created'] == 'true' && !inputs.publish_existing_release }}
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.release-please.outputs['platform--tag_name'] }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          if gh api "repos/${GH_REPO}/git/ref/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists; nothing to do."
          else
            gh api "repos/${GH_REPO}/git/refs" \
              -f ref="refs/tags/${TAG_NAME}" \
              -f sha="${RELEASE_SHA}"
            echo "Created tag ${TAG_NAME} -> ${RELEASE_SHA}"
          fi

      - name: Create or update the next release PR
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        if: ${{ !inputs.publish_existing_release }}
        id: release-please-pr
        with:
          token: ${{ steps.generate-token.outputs.token }}
          config-file: .github/release-please/release-please-config.json
          manifest-file: .github/release-please/.release-please-manifest.json
          target-branch: ${{ github.ref_name }}
          skip-github-release: true

      - name: Log release-please outputs
        # HACK to get toJson to sorta print the output to the console without failing this job
        continue-on-error: true
        env:
          RELEASE_OUTPUTS: ${{ toJson(steps.release-please.outputs) }}
          PR_OUTPUTS: ${{ toJson(steps.release-please-pr.outputs) }}
        run: |
          echo "$RELEASE_OUTPUTS"
          echo "$PR_OUTPUTS"

      - name: Resolve release to publish
        id: resolve-release
        env:
          ACTION_RELEASE_CREATED: ${{ steps.release-please.outputs['platform--release_created'] }}
          ACTION_VERSION: ${{ steps.release-please.outputs['platform--version'] }}
          ACTION_TAG_NAME: ${{ steps.release-please.outputs['platform--tag_name'] }}
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          INPUT_PUBLISH_EXISTING_RELEASE: ${{ inputs.publish_existing_release }}
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "${INPUT_PUBLISH_EXISTING_RELEASE}" = "true" ]; then
            if [ -z "${INPUT_VERSION}" ]; then
              echo "::error::version is required when publish_existing_release is true"
              exit 1
            fi

            TAG_NAME="${INPUT_TAG_NAME:-platform-v${INPUT_VERSION}}"
            gh release view "${TAG_NAME}" --json tagName,isDraft,targetCommitish

            {
              echo "should_publish=true"
              echo "version=${INPUT_VERSION}"
              echo "tag_name=${TAG_NAME}"
              echo "checkout_ref=${TAG_NAME}"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "should_publish=${ACTION_RELEASE_CREATED:-false}"
            echo "version=${ACTION_VERSION}"
            echo "tag_name=${ACTION_TAG_NAME}"
            echo "checkout_ref=${ACTION_TAG_NAME}"
          } >> "${GITHUB_OUTPUT}"

  build-and-push-mcp-server-docker-image:
    name: Build and push MCP Server Docker image
    if: ${{ needs.release-please.outputs.platform_should_publish == 'true' && (github.event_name != 'workflow_dispatch' || inputs.publish_mcp_server_image) }}
    uses: ./.github/workflows/build-base-mcp-server-docker-image.yml
    needs:
      - release-please
    permissions:
      contents: read # Required to invoke the reusable image build workflow.
      id-token: write # Required for Workload Identity Federation.
    with:
      push_to_gcr: true
      version: ${{ needs.release-please.outputs.platform_version }}
      checkout_ref: ${{ needs.release-please.outputs.platform_checkout_ref }}
    secrets:
      GCP_SERVICE_ACCOUNT_NAME: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_SERVICE_ACCOUNT_NAME }}
      GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER }}

  build-and-push-sandbox-base-docker-image:
    name: Build and push Sandbox Base Docker image
    # The sandbox base ships with every platform release: the engine pulls it as
    # the pre-baked code-runtime base, so it is published whenever the platform is.
    if: ${{ needs.release-please.outputs.platform_should_publish == 'true' }}
    uses: ./.github/workflows/build-sandbox-base-docker-image.yml
    needs:
      - release-please
    permissions:
      contents: read # Required to invoke the reusable image build workflow.
      id-token: write # Required for Workload Identity Federation.
    with:
      push_to_gcr: true
      version: ${{ needs.release-please.outputs.platform_version }}
      checkout_ref: ${{ needs.release-please.outputs.platform_checkout_ref }}
    secrets:
      GCP_SERVICE_ACCOUNT_NAME: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_SERVICE_ACCOUNT_NAME }}
      GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER }}

  build-and-push-platform-docker-image-to-dockerhub:
    name: Build and push platform Docker image to Docker Hub
    # The platform Docker image references the MCP server base image tag via
    # ARCHESTRA_ORCHESTRATOR_MCP_SERVER_BASE_IMAGE env var, but does NOT use it as a FROM base image.
    # The tag is baked as a default value at build time, so the MCP server image doesn't need to
    # exist yet. Both images are built in parallel and the publish-github-release job gates on
    # all artifacts being ready before un-drafting the release.
    if: ${{ needs.release-please.outputs.platform_should_publish == 'true' && (github.event_name != 'workflow_dispatch' || inputs.publish_platform_image) }}
    uses: ./.github/workflows/build-dockerhub-image.yml
    needs:
      - release-please
    permissions:
      contents: read # Required to invoke the reusable Docker build workflow.
      id-token: write # Required for Workload Identity Federation.
    with:
      image_directory: ./platform
      image_name: platform
      version: ${{ needs.release-please.outputs.platform_version }}
      push_image: true
      checkout_ref: ${{ needs.release-please.outputs.platform_checkout_ref }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      PLATFORM_NEXTJS_SOURCE_MAP_SENTRY_AUTH_TOKEN: ${{ secrets.PLATFORM_NEXTJS_SOURCE_MAP_SENTRY_AUTH_TOKEN }}
      TURBOREPO_REMOTE_CACHING_TOKEN: ${{ secrets.TURBOREPO_REMOTE_CACHING_TOKEN }}
      TURBOREPO_REMOTE_CACHING_TEAM: ${{ secrets.TURBOREPO_REMOTE_CACHING_TEAM }}

  publish-platform-helm-chart:
    name: Publish platform Helm chart
    # The Helm chart only references the version tag (not image content), so it can run
    # in parallel with Docker image builds. The publish-github-release job ensures all
    # artifacts are ready before the release is made visible.
    if: ${{ needs.release-please.outputs.platform_should_publish == 'true' && (github.event_name != 'workflow_dispatch' || inputs.publish_helm_chart) }}
    uses: ./.github/workflows/publish-platform-helm-chart.yml
    needs:
      - release-please
    permissions:
      contents: write # Required to publish Helm chart metadata from the repository.
      id-token: write # Required for Workload Identity Federation.
    with:
      version: ${{ needs.release-please.outputs.platform_version }}
      push_chart: true
      checkout_ref: ${{ needs.release-please.outputs.platform_checkout_ref }}
    secrets:
      GCP_SERVICE_ACCOUNT_NAME: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_SERVICE_ACCOUNT_NAME }}
      GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER }}

  publish-github-release:
    name: Publish GitHub Release
    # Un-drafts the GitHub release and triggers the website deploy only after ALL artifacts
    # (MCP server image, sandbox base image, platform Docker image, Helm chart) are published.
    if: ${{ always() && needs.release-please.outputs.platform_should_publish == 'true' && (github.event_name != 'workflow_dispatch' || inputs.finalize_github_release) && (needs.build-and-push-mcp-server-docker-image.result == 'success' || needs.build-and-push-mcp-server-docker-image.result == 'skipped') && (needs.build-and-push-sandbox-base-docker-image.result == 'success' || needs.build-and-push-sandbox-base-docker-image.result == 'skipped') && (needs.build-and-push-platform-docker-image-to-dockerhub.result == 'success' || needs.build-and-push-platform-docker-image-to-dockerhub.result == 'skipped') && (needs.publish-platform-helm-chart.result == 'success' || needs.publish-platform-helm-chart.result == 'skipped') }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs:
      - release-please
      - build-and-push-mcp-server-docker-image
      - build-and-push-sandbox-base-docker-image
      - build-and-push-platform-docker-image-to-dockerhub
      - publish-platform-helm-chart
    permissions:
      contents: write # Required to publish the GitHub release draft.
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Generate a token
        id: generate-token
        uses: ./.github/actions/github-app-token
        with:
          app-id: ${{ secrets.ARCHESTRA_RELEASER_GITHUB_APP_ID }}
          private-key: ${{ secrets.ARCHESTRA_RELEASER_GITHUB_APP_PRIVATE_KEY }}

      # Publish the draft (draft -> published) now that all artifacts are ready. This is
      # the one release-state transition GitHub's immutable-releases feature allows, and
      # it is what locks the release as immutable. Guarded so re-runs / the
      # publish_existing_release path don't 422 on an already-published release.
      - name: Publish release
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.release-please.outputs.platform_tag_name }}
        run: |
          IS_DRAFT=$(gh release view "$TAG_NAME" --json isDraft --jq '.isDraft')
          if [ "$IS_DRAFT" = "true" ]; then
            gh release edit "$TAG_NAME" --draft=false
            echo "Published release $TAG_NAME."
          else
            echo "Release $TAG_NAME is already published; skipping."
          fi

      - name: Trigger website deploy
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.WEBSITE_VERCEL_DEPLOY_HOOK_URL }}
        run: curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"

  notify-release-failure:
    name: Notify release failure
    # Pages #alerting when a release that was ACTUALLY being published fails, so a broken
    # release (e.g. an image or chart that never published) is surfaced immediately
    # instead of failing silently.
    #
    # The release-please job runs in two contexts: on every push to main it just rebuilds
    # the release PR (should_publish=false), and only when a release PR is merged does it
    # actually cut a release (should_publish=true). We gate on platform_should_publish so
    # transient flakes in the former context (e.g. release-please's "other side closed"
    # API blips, which self-heal on the next commit) don't page anyone. Real publish
    # failures set should_publish=true before any downstream step can fail, so they still
    # alert.
    needs:
      - release-please
      - build-and-push-mcp-server-docker-image
      - build-and-push-sandbox-base-docker-image
      - build-and-push-platform-docker-image-to-dockerhub
      - publish-platform-helm-chart
      - publish-github-release
    if: ${{ always() && needs.release-please.outputs.platform_should_publish == 'true' && contains(needs.*.result, 'failure') }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions: {}
    steps:
      - name: Post failure alert to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_ALERTING_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VERSION: ${{ needs.release-please.outputs.platform_version }}
          RP_RESULT: ${{ needs.release-please.result }}
          MCP_RESULT: ${{ needs.build-and-push-mcp-server-docker-image.result }}
          SANDBOX_RESULT: ${{ needs.build-and-push-sandbox-base-docker-image.result }}
          PLATFORM_RESULT: ${{ needs.build-and-push-platform-docker-image-to-dockerhub.result }}
          HELM_RESULT: ${{ needs.publish-platform-helm-chart.result }}
          PUBLISH_RESULT: ${{ needs.publish-github-release.result }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "::warning::SLACK_ALERTING_WEBHOOK_URL not set; skipping Slack alert."
            exit 0
          fi
          TEXT=":rotating_light: *Platform release failed* — \`${VERSION:-unknown}\`
          A job in the release pipeline failed, so release artifacts may not have published.
          • release-please: \`${RP_RESULT}\`
          • platform image (Docker Hub): \`${PLATFORM_RESULT}\`
          • MCP server image: \`${MCP_RESULT}\`
          • sandbox base image: \`${SANDBOX_RESULT}\`
          • Helm chart: \`${HELM_RESULT}\`
          • publish GitHub release: \`${PUBLISH_RESULT}\`
          <${RUN_URL}|View failed CI run>"
          jq -n --arg text "$TEXT" '{text: $text}' \
            | curl -sSf -X POST -H 'Content-type: application/json' --data @- "${SLACK_WEBHOOK_URL}"
