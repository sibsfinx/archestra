name: On Pull Requests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  # Required checks must also run on merge_group when merge queue is enabled,
  # otherwise the queue waits for PR-only statuses that never appear on the
  # temporary merge-group SHA.
  merge_group:

permissions: {}

concurrency:
  group: "on-pull-requests-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}"
  cancel-in-progress: true

jobs:
  release-freeze-check:
    name: Release Freeze Check
    # Always run so it can be a required status check - passes immediately for
    # non-release-please PRs and merge queue runs.
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read # Required to inspect the repository context for release-please PRs.
      pull-requests: write # Required to request changes on frozen release PRs.
    steps:
      - name: Check if this requires freeze validation
        id: check-context
        run: |
          if [ "$EVENT_NAME" = "merge_group" ]; then
            echo "should_check=false" >> "$GITHUB_OUTPUT"
            echo "Merge queue run - passing release freeze check."
            exit 0
          fi

          if [[ "$HEAD_REF" == release-please--* ]]; then
            echo "should_check=true" >> "$GITHUB_OUTPUT"
            echo "🔖 This is a release-please PR - checking freeze status"
          else
            echo "should_check=false" >> "$GITHUB_OUTPUT"
            echo "✅ Not a release-please PR - passing automatically"
          fi
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}

      - name: Check if release is frozen
        id: check-freeze
        if: steps.check-context.outputs.should_check == 'true'
        env:
          RELEASE_FREEZE: ${{ vars.RELEASE_FREEZE }}
        run: |
          if [ "$RELEASE_FREEZE" = "true" ]; then
            echo "frozen=true" >> "$GITHUB_OUTPUT"
            echo "❄️ Release freeze is active"
          else
            echo "frozen=false" >> "$GITHUB_OUTPUT"
            echo "✅ No release freeze active. Release-please PR can proceed."
          fi

      - name: Checkout repository
        if: steps.check-context.outputs.should_check == 'true' && steps.check-freeze.outputs.frozen == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Request changes on PR
        if: steps.check-context.outputs.should_check == 'true' && steps.check-freeze.outputs.frozen == 'true'
        uses: ./.github/actions/release-freeze-review
        with:
          action: freeze
          app-id: ${{ secrets.ARCHESTRA_RELEASE_FREEZE_CHECKER_GITHUB_APP_ID }}
          private-key: ${{ secrets.ARCHESTRA_RELEASE_FREEZE_CHECKER_GITHUB_APP_PRIVATE_KEY }}
          pr-number: ${{ github.event.pull_request.number }}

      - name: Fail if frozen
        if: steps.check-context.outputs.should_check == 'true' && steps.check-freeze.outputs.frozen == 'true'
        run: |
          echo "::error::❄️ Release freeze is active. Merging release-please PRs is blocked."
          exit 1

  license-compliance-check:
    name: License Compliance Check
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./platform
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          working-directory: ./platform

      - name: Run license compliance check
        run: pnpm license-check --ci

      - name: Generate full license report (on failure)
        if: failure()
        run: |
          echo "## License Compliance Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "❌ License check failed. See details below:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          pnpm license-check 2>&1 | head -100 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Add success summary
        if: success()
        run: |
          echo "## ✅ License Compliance Check Passed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No GPL/AGPL/Unknown licenses found in dependencies." >> "$GITHUB_STEP_SUMMARY"

  supply-chain-policy:
    name: Supply Chain Policy
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Enforce image pinning and download verification policy
        run: |
          python3 -m unittest discover -s .github/scripts -p "test_*.py"
          python3 .github/scripts/check-supply-chain-policy.py

  docs-image-policy:
    name: Docs Image Policy
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Enforce docs asset format and size policy
        run: python3 .github/scripts/check-docs-image-policy.py

  docs-links:
    name: Docs Link Check
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Check internal doc links and asset embeds resolve
        run: python3 .github/scripts/check-docs-links.py

  migration-kit-checks:
    name: Migration Kit Checks
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      # the shipped scripts are zero-dependency; this gates the contributor tooling
      # (pytest + the ty / ruff / zero-dependency gates), pinned to the supported python floor.
      - name: Run migration-kit gates
        run: uv run --python 3.10 --frozen --directory migration-kit --group dev pytest -q

  dependency-review:
    name: Dependency Review
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read # Required for dependency-review-action to read the PR dependency graph via the API.
      pull-requests: write # Required for dependency-review-action PR comments.
    steps:
      # No checkout: dependency-review-action reads the PR diff via the GitHub
      # API and references no local config file, so the (fetch-depth: 0) checkout
      # was ~74s of the job's ~89s for nothing.
      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          # NOTE: disable license check here because we are already doing it in the license-compliance-check job
          # allow-licenses: MIT
          license-check: "false"
          comment-summary-in-pr: on-failure
          # GHSA-82j2-j2ch-gfr8 (rustls-webpki <0.103.13 CRL-parsing DoS) is a
          # transitive dep of dagger-sdk, which pins reqwest 0.11 + rustls-tls
          # (rustls 0.21 caps rustls-webpki at <0.102) — no patched version is
          # reachable. The Dagger client only does TLS against a trusted local
          # engine session, so attacker-controlled CRL parsing is not reachable.
          # Revisit once dagger-sdk moves to reqwest 0.12 / rustls 0.23.
          allow-ghsas: GHSA-82j2-j2ch-gfr8

  dependency-review-merge-group:
    name: Dependency Review
    if: ${{ github.event_name == 'merge_group' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions: {}
    steps:
      - name: Skip dependency review for merge queue
        run: echo "Dependency Review only has PR diff context; PR run already validated dependencies before merge queue."

  # Fast feedback on every PR push: lint + typecheck + unit tests.
  # Full E2E runs in the separate "Platform E2E Tests" workflow on merge queue
  # or on-demand via the "run-e2e" PR label.
  platform-lint-and-unit-tests:
    name: Platform Lint and Unit Tests
    runs-on: blacksmith-16vcpu-ubuntu-2404
    # Backstop: every check here finishes in well under 10m, but leaked
    # test-runner processes (vitest fork workers / esbuild) occasionally orphan
    # and hold the step's log pipe open, leaving a *finished* job hanging until
    # GitHub's 6h default. Fail fast instead.
    timeout-minutes: 20
    permissions:
      contents: write # Required to push generated code updates back to release-please PRs.
    defaults:
      run:
        working-directory: ./platform
    env:
      TURBO_TOKEN: ${{ secrets.TURBOREPO_REMOTE_CACHING_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBOREPO_REMOTE_CACHING_TEAM }}
    steps:
      - name: Check if this is a release-please PR
        id: check-release-please
        working-directory: .
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && [[ "$HEAD_REF" == release-please--* ]]; then
            echo "is-release-please=true" >> "$GITHUB_OUTPUT"
            echo "Release-please PR detected; generated files will be auto-committed if needed."
          else
            echo "is-release-please=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}

      - name: Checkout project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      # Generate a GitHub App token for release-please PRs so pushed generated
      # updates re-trigger workflows. Pushes made with GITHUB_TOKEN do not.
      - name: Generate token for release-please PR
        if: ${{ steps.check-release-please.outputs.is-release-please == 'true' }}
        id: generate-token
        uses: ./.github/actions/github-app-token
        with:
          app-id: ${{ secrets.ARCHESTRA_RELEASER_GITHUB_APP_ID }}
          private-key: ${{ secrets.ARCHESTRA_RELEASER_GITHUB_APP_PRIVATE_KEY }}

      - name: Update checkout credentials for release-please PR
        if: ${{ steps.check-release-please.outputs.is-release-please == 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true # zizmor: ignore[artipacked] release-please PRs need push credentials for generated updates.
          ref: ${{ github.head_ref }}
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          working-directory: ./platform

      # setup-env uses --frozen-lockfile, which skips minimum-release-age checks.
      # --fix-lockfile re-resolves and fails on immature deps (ERR_PNPM_NO_MATURE_MATCHING_VERSION).
      - name: Verify no immature dependencies
        run: pnpm install --fix-lockfile --lockfile-only --ignore-scripts

      # Fork PRs run without turbo remote caching (secrets are withheld), so
      # the Rust NAPI crate builds below actually invoke cargo. Sync the
      # pinned toolchain (rust-toolchain.toml) serially first — otherwise
      # turbo's parallel crate builds each trigger a concurrent rustup
      # download of the same components, which races and fails with
      # "could not rename downloaded file".
      - name: Setup Rust
        run: rustup show

      # Backend unit tests run in the parallel sharded "Backend Unit Tests"
      # jobs below; here the backend runs check:commit (same checks minus
      # vitest) so this job stops being serialized behind the largest suite.
      - name: Type checking, linting, formatting, unit tests
        run: |
          pnpm exec turbo check:ci --filter=!@backend
          pnpm exec turbo check:commit --filter=@backend

      # Validates the production build (turbo build: next build + backend build +
      # Rust NAPI) compiles on every push. This replaces the per-push Docker image
      # build's only unique signal; turbo remote caching makes it seconds on hit.
      - name: Production build
        run: pnpm build

      - name: Run validation checks (drizzle-kit, codegen, db migrations)
        env:
          IS_RELEASE_PLEASE_PR: ${{ steps.check-release-please.outputs.is-release-please }}
        run: |
          set -e

          # Start drizzle-kit check in background
          echo "Starting drizzle-kit check in background..."
          (cd backend && pnpm drizzle-kit check) &
          DRIZZLE_PID=$!

          # Run codegen and lint
          echo "Running codegen..."
          pnpm codegen
          pnpm lint:fix

          # Check for codegen changes
          if ! git -C "$GITHUB_WORKSPACE" diff --exit-code -- docs/ platform/ || ! git -C "$GITHUB_WORKSPACE" diff --cached --exit-code -- docs/ platform/; then
            if [ "$IS_RELEASE_PLEASE_PR" = "true" ]; then
              echo "Waiting for drizzle-kit check before auto-committing generated changes..."
              wait $DRIZZLE_PID

              echo "Release-please PR with generated changes detected. Auto-committing..."
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git -C "$GITHUB_WORKSPACE" add docs/ platform/
              git commit -m "chore: update docs/openapi.json version for release"
              git push
              echo "Changes committed. Workflow will be re-triggered."
              exit 0
            else
              echo "::error::Codegen produced changes. Please run 'pnpm codegen && pnpm lint:fix' locally and commit the results."
              git -C "$GITHUB_WORKSPACE" diff --stat -- docs/ platform/
              exit 1
            fi
          fi

          # Wait for drizzle-kit check
          echo "Waiting for drizzle-kit check..."
          wait $DRIZZLE_PID

          # Generate migrations and ensure no new migrations are created
          echo "Checking for missing database migrations..."
          set +e
          if timeout 15s pnpm db:generate > /tmp/db_generate_output.txt 2>&1; then
            output=$(cat /tmp/db_generate_output.txt)
            echo "$output"
            if echo "$output" | grep -q "❯\|Is.*table created or renamed"; then
              echo "::error::Interactive prompt detected. Pending database migrations need to be committed."
              exit 1
            fi
          else
            exit_code=$?
            cat /tmp/db_generate_output.txt 2>/dev/null || true
            if [ $exit_code -eq 124 ]; then
              echo "::error::pnpm db:generate timed out, likely waiting for interactive migration input."
            else
              echo "::error::pnpm db:generate failed with exit code $exit_code."
            fi
            exit 1
          fi
          set -e

          if ! git diff --exit-code -- backend/src/database/migrations/ || ! git diff --cached --exit-code -- backend/src/database/migrations/; then
            echo "::error::Database schema changes require a migration. Please run 'pnpm db:generate' locally and commit the generated migration."
            git diff --stat backend/src/database/migrations/
            exit 1
          fi

          echo "✅ All validation checks passed"

  # Rust toolchain checks, split out of the lint job so cargo work runs in
  # parallel with the pnpm work instead of serializing ~1.5-2 min ahead of it.
  # Needs no pnpm/setup-env: the Dagger sync script is pure shell and cargo
  # operates on the committed lockfile.
  platform-rust-checks:
    name: Platform Rust Checks
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./platform
    steps:
      - name: Checkout project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Rust
        run: |
          rustup show
          rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl

      - name: Install Rust musl toolchain dependencies
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Verify Dagger version sync
        run: ./scripts/check-dagger-version-sync.sh

      - name: Rust musl checks
        working-directory: ./platform/archestra-rs
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: |
          cargo check --workspace --locked --target x86_64-unknown-linux-musl

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.20.2 --locked

      - name: Rust dependency policy
        working-directory: ./platform/archestra-rs
        run: cargo deny --config deny.toml check advisories bans licenses sources

  ai-labs-rust-checks:
    name: AI Labs Rust Checks
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./ai-labs
    steps:
      - name: Checkout project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Rust
        run: rustup show

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Rust formatting
        run: cargo fmt --all --check

      - name: Rust check
        run: cargo check --workspace --locked

      - name: Rust lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Rust tests
        run: cargo test --workspace --locked

  # Backend unit tests, sharded across parallel runners. Vitest's --shard
  # slices the file list deterministically (SHA1 of each path), so the four
  # jobs partition the suite exactly once. Splitting this out of the lint job
  # takes the suite off the workflow's critical path.
  backend-unit-tests:
    name: Backend Unit Tests (shard ${{ matrix.shard }}/4)
    runs-on: blacksmith-16vcpu-ubuntu-2404
    # A full local suite run is ~4 min on comparable hardware; a shard is a
    # quarter of that plus setup. 15 minutes means something is hung.
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./platform
    env:
      TURBO_TOKEN: ${{ secrets.TURBOREPO_REMOTE_CACHING_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBOREPO_REMOTE_CACHING_TEAM }}
    strategy:
      # A failing shard must not cancel its siblings; we want the full
      # failure picture in one pass.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          working-directory: ./platform

      # Tests load the Rust NAPI bindings (@archestra/app-runtime-rs etc.),
      # which `turbo check:ci` builds implicitly via the task graph. Running
      # vitest directly skips that, so build backend's workspace deps here —
      # turbo remote caching makes this seconds on a cache hit, and on a hit
      # no cargo runs, so the pinned Rust toolchain isn't needed at all
      # (an unconditional `rustup show` cost ~10s per shard). On a miss
      # (fork PRs run without cache secrets, so cargo really builds), turbo's
      # parallel crate builds each trigger a concurrent rustup download of
      # the same toolchain, which races and fails with "could not rename
      # downloaded file" — so on failure, sync the toolchain serially and
      # retry once.
      - name: Build backend workspace dependencies
        run: |
          pnpm exec turbo build --filter="@backend^..." || {
            echo "Build failed — syncing pinned Rust toolchain and retrying once..."
            rustup show
            pnpm exec turbo build --filter="@backend^..."
          }

      # --no-memory-protection-keys: V8's PKU-backed JIT-page tracking
      # (ThreadIsolation) intermittently dies with a fatal
      # "Check failed: jit_page.has_value()" when WASM (PGlite) runs across
      # vitest worker threads. The hardware feature only exists on these
      # Linux runners' CPUs — dev machines never hit it. PKU is a
      # defense-in-depth hardening for JIT pages, not a correctness feature,
      # so disabling it for the test run is safe. NODE_OPTIONS disallows the
      # flag, hence invoking the vitest entry through node directly.
      - name: Run backend unit tests (shard ${{ matrix.shard }} of 4)
        working-directory: ./platform/backend
        env:
          SHARD: ${{ matrix.shard }}
        run: node --no-memory-protection-keys node_modules/vitest/vitest.mjs run --shard="${SHARD}/4"

  # Stable-named gate over the shard matrix so branch protection / merge queue
  # can require a single check ("Backend Unit Tests") regardless of shard count.
  backend-unit-tests-gate:
    name: Backend Unit Tests
    runs-on: blacksmith-2vcpu-ubuntu-2404
    if: always()
    needs: [backend-unit-tests]
    permissions: {}
    steps:
      - name: Check shard results
        env:
          SHARDS_RESULT: ${{ needs.backend-unit-tests.result }}
        run: |
          if [ "$SHARDS_RESULT" != "success" ]; then
            echo "::error::One or more backend unit test shards failed (result: $SHARDS_RESULT)."
            exit 1
          fi
          echo "✅ All backend unit test shards passed."

  frontend-integration-tests:
    name: Frontend Integration Tests (MSW)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./platform
    env:
      TURBO_TOKEN: ${{ secrets.TURBOREPO_REMOTE_CACHING_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBOREPO_REMOTE_CACHING_TEAM }}
    steps:
      - name: Checkout project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          working-directory: ./platform

      - name: Run codegen
        run: pnpm codegen

      - name: Resolve Playwright version
        id: pw-version
        run: |
          version=$(pnpm --filter @frontend exec playwright --version | awk '{print $2}')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: ./.github/actions/github-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Chromium for Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @frontend exec playwright install --with-deps chromium

      - name: Install Chromium system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @frontend exec playwright install-deps chromium

      - name: Run integration tests
        run: pnpm test:integration

      - name: Upload Playwright report
        if: failure()
        uses: ./.github/actions/github-upload-artifact
        with:
          name: playwright-integration-report
          path: platform/frontend/playwright-report/
          retention-days: "7"

      - name: Upload traces
        if: failure()
        uses: ./.github/actions/github-upload-artifact
        with:
          name: playwright-integration-traces
          path: platform/frontend/test-results/
          retention-days: "7"

  helm-chart-linting-and-tests:
    name: Helm Chart Linting and Tests
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read # Required to checkout the repository and lint/package the Helm chart.
    defaults:
      run:
        working-directory: ./platform/helm/archestra
    steps:
      - name: Checkout project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Linting
        run: helm lint .

      - name: Tests
        run: |
          HELM_UNITTEST_VERSION="1.0.3"
          HELM_UNITTEST_ARCHIVE="helm-unittest-linux-amd64-${HELM_UNITTEST_VERSION}.tgz"
          HELM_UNITTEST_BASE_URL="https://github.com/helm-unittest/helm-unittest/releases/download/v${HELM_UNITTEST_VERSION}"
          curl -fsSL -o /tmp/helm-unittest-checksum.sha "${HELM_UNITTEST_BASE_URL}/helm-unittest-checksum.sha"
          curl -fsSL -o "/tmp/${HELM_UNITTEST_ARCHIVE}" "${HELM_UNITTEST_BASE_URL}/${HELM_UNITTEST_ARCHIVE}"
          (
            cd /tmp
            awk -v archive="${HELM_UNITTEST_ARCHIVE}" '
              $2 ~ ("/" archive "$") {
                print $1 " *" archive
              }
            ' helm-unittest-checksum.sha | sha256sum -c -
          )
          HELM_UNITTEST_EXTRACT_DIR="$(mktemp -d)"
          HELM_PLUGINS_DIR="$(helm env HELM_PLUGINS)"
          mkdir -p "${HELM_PLUGINS_DIR}/unittest"
          tar -xzf "/tmp/${HELM_UNITTEST_ARCHIVE}" -C "${HELM_UNITTEST_EXTRACT_DIR}"
          cp -R "${HELM_UNITTEST_EXTRACT_DIR}/." "${HELM_PLUGINS_DIR}/unittest"
          helm unittest .

      - name: helm package
        # NOTE: can't use ${{ github.sha }} for version here because it's not a valid version number
        # and helm package explicitly checks this.
        run: |
          helm package . --version v0.0.1 --app-version v0.0.1
