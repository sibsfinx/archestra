<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}bench dashboard{% endblock %}</title>
    <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@2/css/pico.classless.min.css">
    <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.2/bundles/datastar.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="/">
            <span class="brand-mark">⬡</span>
            <span>archestra-bench</span>
        </a>
        <span class="brand-sub">trajectory dashboard</span>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
