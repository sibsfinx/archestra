[[stages]]
text = """Handing off the overnight traffic review -- I've attached flows.csv from last night. The columns are src_ip, dst_ip, dst_port, proto, packets, bytes, first_ts, last_ts, and the timestamps are epoch seconds. Could you run it through our usual triage and tell me which source IPs look off?

The patterns we watch for: port scanning -- a source touching a single destination across a wide spread of different ports. Flooding -- a source with any single flow blasting packets far faster than a normal flow (an extreme packets-per-second rate). Beaconing -- a source calling the same destination back over and over on a steady, near-constant interval. Scope each pattern to the (src_ip, dst_ip) pair, and use your judgement on what counts as a wide spread / an extreme rate / a steady interval.

I'd also like the flow count per proto.

Send it back with submit_result as result = {"protocol_counts": {"<proto>": <count>, ...}, "port_scan_src_ips": [...], "dos_src_ips": [...], "beaconing_src_ips": [...], "flags": {"port_scan": <bool>, "dos": <bool>, "beaconing": <bool>}}, where each flag just says whether the matching list came back non-empty."""

  [[stages.files]]
  src = "flows.csv"
  dest = "/home/sandbox/attachments/flows.csv"
  mime_type = "text/csv"

[result_schema]
type = "object"
required = ["protocol_counts", "port_scan_src_ips", "dos_src_ips", "beaconing_src_ips", "flags"]
additionalProperties = false

  [result_schema.properties.protocol_counts]
  type = "object"

    [result_schema.properties.protocol_counts.additionalProperties]
    type = "integer"
    minimum = 0

  [result_schema.properties.port_scan_src_ips]
  type = "array"

    [result_schema.properties.port_scan_src_ips.items]
    type = "string"

  [result_schema.properties.dos_src_ips]
  type = "array"

    [result_schema.properties.dos_src_ips.items]
    type = "string"

  [result_schema.properties.beaconing_src_ips]
  type = "array"

    [result_schema.properties.beaconing_src_ips.items]
    type = "string"

  [result_schema.properties.flags]
  type = "object"
  required = ["port_scan", "dos", "beaconing"]
  additionalProperties = false

    [result_schema.properties.flags.properties.port_scan]
    type = "boolean"

    [result_schema.properties.flags.properties.dos]
    type = "boolean"

    [result_schema.properties.flags.properties.beaconing]
    type = "boolean"

[verifier]
deps = []
