[[stages]]
text = """Can you build an app called `access-request-app-{{cell}}` that lets a teammate file a request for access to one of our systems? They pick the system, choose an access level, add a short justification, and send it off. Everyone uses their own account, so if someone isn't set up yet, it should help them get connected before they can file a request. Let's start there."""

[[stages]]
text = """Thinking about it more -- admin-level requests shouldn't just sail through. Block an admin request unless that person has a director exception on file, and if they don't, tell them why it can't go through."""

[[stages]]
text = """After someone connects their account, don't make them re-fill the form and click send again -- bring them back to their filled-in request, ready to go."""

[[stages]]
text = """Last tweak before we hand it out: only show the systems that belong to the IT team, not every system we've got. Once that's in, share it with the whole team so people can start filing requests with it."""

[[stages]]
new_conversation = true
text = """Coming back to that access-request-app-{{cell}} we rolled out -- people keep pinging IT to ask where a request they already filed stands. Could you add a way for someone to look up the status of their existing requests right inside the app? When it's working, call submit_result with result = {"app_id": "<the app's id>", "app_name": "<the app's name>"}."""

[result_schema]
type = "object"
required = ["app_id", "app_name"]
additionalProperties = false

  [result_schema.properties.app_id]
  type = "string"
  minLength = 1

  [result_schema.properties.app_name]
  type = "string"
  minLength = 1

[state]
rest = ["/api/apps?search=access-request-app-{{cell}}&limit=100"]
